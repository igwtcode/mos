# vim: ft=conf fileencoding=utf-8 foldmethod=marker
# https://github.com/CodyReichert/dotfiles/blob/master/kitty/.config/kitty/kitty.conf
# https://gist.github.com/johnallen3d/9b13de956a90275cb391af8917cab24c

map ctrl+shift+0 change_font_size all 0

hide_window_decorations yes

background_opacity 0.87
background_blur 1

window_padding_width 9

font_family      GeistMono NFM
bold_font        GeistMono NFM Medium 
italic_font      GeistMono NFM Italic
bold_italic_font GeistMono NFM Medium Italic

font_size 12.0

force_ltr no

adjust_line_height  0
adjust_column_width 0

font_features none

scrollback_lines 9000

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes

shell_integration no-cursor

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
#: The cursor shape can be one of (block, beam, underline)

copy_on_select yes

strip_trailing_spaces smart
#: Remove spaces at the end of lines when copying to clipboard. A
#: value of smart will do it when using normal selections, but not
#: rectangle selections. always will always do it.

# window_padding_width 3.0

confirm_os_window_close 0

tab_bar_min_tabs            2
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_margin_width        0.0
tab_bar_margin_height       2.5 1.5
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

include ~/.config/kitty/themes/colors.conf
